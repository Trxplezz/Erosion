<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EROSION</title>

  <style>
    /* (your same CSS — unchanged) */
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#050505;
      --panel:#0b0b0b;
      --line:rgba(255,255,255,0.08);
      --line-strong:rgba(255,255,255,0.18);
      --text:#ffffff;
      --muted:#aaaaaa;
    }
    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    /* (rest of your CSS stays the same — no changes needed) */
  </style>
</head>

<body>

<!-- 🔒 PASSWORD LOCK -->
<script>
  const password = "1234";
  document.body.style.display = "none";

  let userPass = prompt("Enter password:");

  if (userPass === password) {
    document.body.style.display = "block";
  } else {
    alert("Wrong password");
  }
</script>

<header>
  <div class="nav">
    <div class="logo-text">EROSION</div>
    <div class="nav-links">
      <a href="#shop">SHOP</a>
      <a href="#bundles">BUNDLES</a>
      <a href="#shop">COLLECTIONS</a>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-inner">
    <img src="logo.jpg" alt="EROSION logo" />
    <h1>BUILT FROM DECAY.</h1>
    <p>Modern technical streetwear.</p>
    <a class="btn" href="#shop">SHOP NOW</a>
  </div>
</section>

<section class="products-wrap" id="shop">
  <div class="products-title">NEW ARRIVALS</div>

  <div class="products">
    <div class="card">
      <img src="jacket.jpg" />
      <div class="card-body">
        <div class="card-title">EROSION SHELL JACKET</div>
        <div class="price">$99.99</div>
        <button onclick="buyNow('jacket')">BUY NOW</button>
      </div>
    </div>

    <div class="card">
      <img src="tee.jpg" />
      <div class="card-body">
        <div class="card-title">EROSION TEE</div>
        <div class="price">$49.99</div>
        <button onclick="buyNow('tee')">BUY NOW</button>
      </div>
    </div>

    <div class="card">
      <img src="pants.jpg" />
      <div class="card-body">
        <div class="card-title">EROSION SWEATPANTS</div>
        <div class="price">$49.99</div>
        <button onclick="buyNow('pants')">BUY NOW</button>
      </div>
    </div>

    <div class="card">
      <img src="beanie.jpg" />
      <div class="card-body">
        <div class="card-title">EROSION BEANIE</div>
        <div class="price">$35.99</div>
        <button onclick="buyNow('beanie')">BUY NOW</button>
      </div>
    </div>
  </div>
</section>

<section id="bundles">
  <h2>BUNDLES</h2>

  <button onclick="buyBundleFullSet()">FULL SET</button>
  <button onclick="buyBundleCoreSet()">TEE + SWEATPANTS</button>
  <button onclick="buyBundleEssentialSet()">BEANIE + TEE</button>
  <button onclick="buyBundleTripleSet()">3 PIECE</button>
</section>

<script>
function buyNow(productId) {
  const links = {
    jacket: "https://buy.stripe.com/28E3cv2qj67M7GpbXY0VO03",
    tee: "https://buy.stripe.com/5kQdR98OHbs6aSB3rs0VO02",
    pants: "https://buy.stripe.com/00w5kD7KD67M4ud8LM0VO01",
    beanie: "https://buy.stripe.com/5kQ8wP9SL67Md0Jgee0VO00"
  };
  window.location.href = links[productId];
}

function buyBundleFullSet() {
  window.location.href = "https://buy.stripe.com/8x2aEX9SLcwad0J7HI0VO07";
}

function buyBundleCoreSet() {
  window.location.href = "https://buy.stripe.com/bJecN50ibeEi6Cl8LM0VO06";
}

function buyBundleEssentialSet() {
  window.location.href = "https://buy.stripe.com/8x24gzd4X7bQgcV9PQ0VO05";
}

function buyBundleTripleSet() {
  window.location.href = "https://buy.stripe.com/eVq4gzd4X3ZE1i17HI0VO04";
}
</script>

</html>
