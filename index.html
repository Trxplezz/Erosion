<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EROSION</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #050505;
      --panel: #0b0b0b;
      --line: rgba(255,255,255,0.08);
      --line-strong: rgba(255,255,255,0.18);
      --text: #ffffff;
      --muted: #aaaaaa;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; }
    img { width: 100%; display: block; }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    .nav {
      max-width: 1400px;
      margin: auto;
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .logo-text {
      letter-spacing: 6px;
      font-size: 14px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      letter-spacing: 2px;
      flex-wrap: wrap;
    }

    .btn, .card-btn, .close-btn {
      background: transparent;
      color: white;
      border: 1px solid var(--line-strong);
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn { padding: 11px 16px; letter-spacing: 2px; }
    .card-btn { flex: 1; padding: 10px; font-size: 11px; letter-spacing: 2px; }

    .btn:hover, .card-btn:hover, .close-btn:hover {
      background: white;
      color: black;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 130px 20px 50px;
    }

    .hero-inner { max-width: 760px; }

    .hero img {
      max-width: 420px;
      margin: 0 auto 28px;
    }

    .hero h1 {
      font-size: clamp(2.2rem, 6vw, 4.5rem);
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .hero p {
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .products-wrap {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .products-title {
      font-size: 14px;
      letter-spacing: 3px;
      margin-bottom: 22px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      overflow: hidden;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: var(--line-strong);
    }

    .product-image-btn {
      width: 100%;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .card-body { padding: 14px; }

    .card-title {
      font-size: 12px;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .price {
      color: var(--muted);
      margin-bottom: 14px;
    }

    .bundle-note {
      color: #888;
      font-size: 11px;
      margin-top: 6px;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .card-buttons {
      display: flex;
      gap: 10px;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: #777;
      font-size: 12px;
      letter-spacing: 2px;
      border-top: 1px solid var(--line);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 2000;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .product-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.96);
      width: min(1000px, calc(100vw - 28px));
      background: #080808;
      border: 1px solid var(--line-strong);
      opacity: 0;
      pointer-events: none;
      transition: 0.2s ease;
      z-index: 2100;
      max-height: 90vh;
      overflow: auto;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
    }

    .product-modal.show {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }

    .modal-image-wrap { background: #0d0d0d; }

    .modal-image {
      width: 100%;
      height: 100%;
      min-height: 420px;
      object-fit: cover;
    }

    .modal-content {
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .modal-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: 32px;
      line-height: 1.05;
      margin-bottom: 12px;
    }

    .modal-price {
      font-size: 18px;
      margin-bottom: 16px;
    }

    .modal-desc {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .close-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 40px;
      height: 40px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<script>
  const password = "1234";
  document.body.style.display = "none";

  let userPass = prompt("Enter password:");

  if (userPass === password) {
    document.body.style.display = "block";
  } else {
    alert("Wrong password");
  }
</script>
